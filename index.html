<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2D6A4F" />
  <meta name="description" content="Cedrella — monitorização inteligente de plantas" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cedrella" />
  <title>Cedrella</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="src/theme/CedrellaTheme.css" />

  <!-- Dexie (IndexedDB) — global used by StorageService.cloud.js -->
  <script src="https://unpkg.com/dexie@3/dist/dexie.min.js"></script>

  <!--
    Import map: remaps StorageService.js → StorageService.cloud.js.
    Dashboard.js imports StorageService.js by name — this intercepts that
    import and swaps in the cloud implementation without touching Dashboard.js.
  -->
  <script type="importmap">
  {
    "imports": {
      "./src/services/StorageService.js": "./src/services/StorageService.cloud.js"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { PT }             from './src/i18n/pt.js';
    import { CedrellaAuth }   from './src/services/CedrellaAuth.js';
    import { StorageService } from './src/services/StorageService.cloud.js';
    import { AuthScreen }     from './src/components/AuthScreen.js';
    import { Dashboard }      from './src/components/Dashboard.js';

    function mountDashboard() {
      new Dashboard().mount('#app');

      // Inject sign-out button into header without changing Dashboard.js
      if (CedrellaAuth.isConfigured()) {
        const header = document.querySelector('.app-header');
        if (header && !header.querySelector('.btn--signout')) {
          const btn = document.createElement('button');
          btn.className   = 'btn btn--signout';
          btn.textContent = PT.signOut;
          btn.addEventListener('click', () => CedrellaAuth.signOut());
          header.appendChild(btn);
        }
      }
    }

    function mountAuth() {
      new AuthScreen().mount('#app');
    }

    function mountError(err) {
      document.getElementById('app').innerHTML =
        `<div class="auth-screen"><div class="auth-card">
           <p style="color:var(--color-danger-dark);font-weight:600">Erro ao carregar</p>
           <pre style="font-size:0.75rem;white-space:pre-wrap;color:var(--color-text-muted)">${err?.message ?? err}</pre>
           <button class="btn btn--ghost btn--full" onclick="location.reload()">Tentar novamente</button>
         </div></div>`;
    }

    try {
      if (!CedrellaAuth.isConfigured()) {
        mountDashboard();
      } else {
        // onAuthStateChange fires first on page load (INITIAL_SESSION or SIGNED_IN),
        // so we set it up before getSession() to avoid missing the event.
        CedrellaAuth.onAuthStateChange(async (event, session) => {
          if (event === 'SIGNED_IN') {
            await StorageService.pullFromCloud().catch(console.warn);
            mountDashboard();
          }
          if (event === 'SIGNED_OUT') {
            mountAuth();
          }
          // INITIAL_SESSION fires immediately on register
          if (event === 'INITIAL_SESSION') {
            session ? mountDashboard() : mountAuth();
          }
        });
      }
    } catch (err) {
      console.error('[Cedrella] Fatal:', err);
      mountError(err);
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registered, scope:', reg.scope))
        .catch(err => console.error('[SW] Registration failed:', err));
    }
  </script>
</body>
</html>
