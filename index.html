<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2D6A4F" />
  <meta name="description" content="Cedrella — monitorização inteligente de plantas" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cedrella" />
  <title>Cedrella</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="src/theme/CedrellaTheme.css" />
  <script src="https://unpkg.com/dexie@3/dist/dexie.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { Dashboard } from './src/components/Dashboard.js';
    new Dashboard().mount('#app');
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registered, scope:', reg.scope))
        .catch(err => console.error('[SW] Registration failed:', err));
    }
  </script>
</body>
</html>
