name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deploy folder
        run: |
          mkdir -p _deploy

          # App shell (public files go to root — paths match absolute /manifest.json etc.)
          cp web/public/index.html    _deploy/
          cp web/public/manifest.json _deploy/
          cp web/public/sw.js         _deploy/

          # Icons (lives at web/icons/ → served as /icons/)
          cp -r web/icons _deploy/

          # JS modules + CSS (served as /src/... relative to page root)
          cp -r web/src _deploy/

          # GitHub Pages: prevent Jekyll processing _ files
          touch _deploy/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          commit_message: 'deploy: ${{ github.sha }}'
